services:
  app:
    image: node:20
    working_dir: /app/backend
    command: >
      bash -lc "npm install --production &&
                 node server.js"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./backend:/app/backend
    restart: always

  web:
    image: nginx:alpine
    restart: always
    ports:
      - 8081:80
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
